<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — AI Sakhi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f7f5;
      color: #1c1c1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      max-width: 440px;
      width: 100%;
    }
    .avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #d1fae5, #34d399);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 22px;
      background: #059669; color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #047857; }
    .tip {
      margin-top: 24px; padding: 14px 16px;
      background: #f0fdf4; border-radius: 12px;
      font-size: 13px; color: #065f46;
      border: 1px solid #bbf7d0;
    }
    .tip strong { display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">📚</div>
    <h1>You're offline right now</h1>
    <p>
      No internet connection detected. Sakhi will be back as soon as you're online.
      Don't worry — your progress is saved and will sync automatically.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
    <div class="tip">
      <strong>💡 Sakhi Tip</strong>
      While offline, you can still review flashcards and notes you've saved earlier.
    </div>
  </div>
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
